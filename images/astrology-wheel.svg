<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">

<style>
text{
  fill:#D4AF37;
  font-size:20px;
  font-family: serif;
  text-anchor:middle;
  dominant-baseline:middle;
}
</style>

<!-- Outer Zodiac Ring -->
<circle cx="300" cy="300" r="280" stroke="#D4AF37" stroke-width="2" fill="none"></circle>

<!-- Zodiac Divider -->
<circle cx="300" cy="300" r="240" stroke="#D4AF37" stroke-width="1" fill="none"></circle>

<!-- House Ring -->
<circle cx="300" cy="300" r="180" stroke="#D4AF37" stroke-width="1" fill="none"></circle>

<!-- Inner Ring -->
<circle cx="300" cy="300" r="120" stroke="#D4AF37" stroke-width="1" fill="none"></circle>

<!-- Center -->
<circle cx="300" cy="300" r="35" stroke="#D4AF37" stroke-width="1" fill="none"></circle>

<!-- 12 Radial Lines -->
<g stroke="#D4AF37" stroke-width="1">
<line x1="300" y1="20" x2="300" y2="580"></line>
<line x1="20" y1="300" x2="580" y2="300"></line>
<line x1="95" y1="95" x2="505" y2="505"></line>
<line x1="505" y1="95" x2="95" y2="505"></line>
<line x1="170" y1="40" x2="430" y2="560"></line>
<line x1="430" y1="40" x2="170" y2="560"></line>
</g>

<!-- Zodiac Signs -->
<text x="300" y="40">♈</text>
<text x="420" y="80">♉</text>
<text x="500" y="180">♊</text>
<text x="520" y="300">♋</text>
<text x="500" y="420">♌</text>
<text x="420" y="520">♍</text>
<text x="300" y="560">♎</text>
<text x="180" y="520">♏</text>
<text x="100" y="420">♐</text>
<text x="80" y="300">♑</text>
<text x="100" y="180">♒</text>
<text x="180" y="80">♓</text>

<!-- House Numbers -->
<text x="300" y="120">1</text>
<text x="380" y="150">2</text>
<text x="430" y="220">3</text>
<text x="440" y="300">4</text>
<text x="420" y="380">5</text>
<text x="360" y="440">6</text>
<text x="300" y="470">7</text>
<text x="240" y="440">8</text>
<text x="180" y="380">9</text>
<text x="160" y="300">10</text>
<text x="190" y="220">11</text>
<text x="240" y="150">12</text>

<!-- Sample Aspect Lines -->
<g stroke="#D4AF37" stroke-width="1">
<line x1="300" y1="180" x2="430" y2="350"></line>
<line x1="430" y1="350" x2="220" y2="420"></line>
<line x1="220" y1="420" x2="300" y2="180"></line>
</g>

</svg>